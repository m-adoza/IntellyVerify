<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:#f4f6f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .auth-container { display:flex; max-width:880px; width:100%; background:#fff; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.08); overflow:hidden; }
        .auth-left { flex:1; background:#0d6efd; padding:50px 40px; color:#fff; display:flex; flex-direction:column; justify-content:center; }
        .auth-left .logo { font-size:2.2rem; font-weight:700; margin-bottom:20px; }
        .auth-left .logo i { margin-right:12px; }
        .auth-left h2 { font-size:2rem; font-weight:700; margin-bottom:15px; }
        .auth-left p { opacity:0.85; line-height:1.7; }
        .auth-right { flex:1.1; padding:50px 40px; display:flex; flex-direction:column; justify-content:center; }
        .auth-right h3 { font-size:1.8rem; font-weight:700; margin-bottom:8px; color:#0b1320; }
        .auth-right .sub { color:#6c757d; margin-bottom:25px; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; font-weight:500; margin-bottom:6px; }
        .form-group input { width:100%; padding:14px 18px; border:2px solid #dee2e6; border-radius:12px; font-family:'Poppins',sans-serif; font-size:1rem; background:#f8fafc; transition:border 0.2s; }
        .form-group input:focus { border-color:#0d6efd; outline:none; background:#fff; }
        .form-group .hint { font-size:0.8rem; color:#6c757d; margin-top:4px; }
        .btn-primary { width:100%; padding:14px; background:#0d6efd; color:#fff; border:none; border-radius:12px; font-size:1.1rem; font-weight:600; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-primary:hover:not(:disabled) { background:#0b5ed7; transform:translateY(-2px); box-shadow:0 8px 25px rgba(13,110,253,0.3); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .auth-footer { text-align:center; margin-top:22px; color:#6c757d; }
        .auth-footer a { color:#0d6efd; font-weight:600; }
        .auth-footer a:hover { text-decoration:underline; }
        .alert { padding:12px 16px; border-radius:10px; margin-bottom:20px; display:none; }
        .alert-danger { background:#f8d7da; color:#842029; border:1px solid #f5c2c7; }
        .alert-success { background:#d1e7dd; color:#0f5132; border:1px solid #badbcc; }
        .spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,0.3); border-radius:50%; border-top-color:#fff; animation:spin 0.8s ease-in-out infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:768px) { .auth-container { flex-direction:column; } .auth-left { padding:30px 25px; text-align:center; } .auth-right { padding:30px 25px; } }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-left">
        <div class="logo"><i class="fas fa-shield-alt"></i> IntelliVerify</div>
        <h2>Create New Password</h2>
        <p>Set a new secure password for your IntelliVerify account. Make sure it's strong and unique.</p>
    </div>
    <div class="auth-right">
        <h3>New Password</h3>
        <p class="sub">Enter your new password below.</p>
        <div id="alertBox" class="alert" style="display:none;"></div>
        <form id="resetForm">
            <div class="form-group"><label for="newPassword">New Password *</label><input type="password" id="newPassword" placeholder="Min 8 chars with uppercase, lowercase, number &amp; symbol" required /><div class="hint">Must contain at least 8 characters, one uppercase, one lowercase, one number, and one special character.</div></div>
            <div class="form-group"><label for="confirmPassword">Confirm New Password *</label><input type="password" id="confirmPassword" placeholder="Re-enter new password" required /></div>
            <button type="submit" class="btn-primary" id="resetBtn"><i class="fas fa-key"></i> Reset Password</button>
        </form>
        <div class="auth-footer"><a href="login.html">Back to Login</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
<script>
    (function() {
        const form = document.getElementById('resetForm');
        const newPassInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const alertBox = document.getElementById('alertBox');
        const resetBtn = document.getElementById('resetBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPass = newPassInput.value;
            const confirmPass = confirmInput.value;

            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            if (newPass !== confirmPass) {
                showAlert('Passwords do not match.', 'danger');
                return;
            }
            const passCheck = window.isStrongPassword(newPass);
            if (!passCheck.valid) {
                showAlert(passCheck.message, 'danger');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span> Updating...';

            try {
                const { error } = await window.updatePassword(newPass);
                if (error) {
                    showAlert(error.message || 'Failed to reset password. Please try again.', 'danger');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                    return;
                }
                showAlert('Password reset successful! Redirecting to login...', 'success');
                resetBtn.innerHTML = '<i class="fas fa-check"></i> Done!';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showAlert('An unexpected error occurred. Please try again.', 'danger');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                console.error(err);
            }
        });

        function showAlert(message, type) {
            alertBox.style.display = 'block';
            alertBox.className = 'alert alert-' + type;
            alertBox.textContent = message;
        }
    })();
</script>
</body>
</html>
