<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Topics | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-header i {
            font-size: 2rem;
            color: #0d6efd;
        }

        .sidebar-header h3 {
            margin-top: 0.5rem;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .sidebar-menu a i {
            width: 24px;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .topics-container {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
        }

        .topic-card {
            border: 1px solid #eef2f7;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .topic-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .topic-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .status-revision { background: #d1ecf1; color: #0c5460; }

        .topic-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #5e7a93;
        }

        .plagiarism-score {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .score-low { background: #d4edda; color: #155724; }
        .score-medium { background: #fff3cd; color: #856404; }
        .score-high { background: #f8d7da; color: #721c24; }

        .topic-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-view {
            background: #0d6efd;
            color: white;
        }

        .btn-edit {
            background: #6c757d;
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #5e7a93;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
            <p style="font-size: 0.8rem; color: #5e7a93;">Student Portal</p>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html" class="active"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-list"></i> My Submitted Topics</h1>
                <p>View all your project topic submissions</p>
            </div>
            <div class="user-info">
                <i class="fas fa-bell" style="font-size: 1.2rem; cursor: pointer;"></i>
                <div class="avatar">JD</div>
            </div>
        </div>

        <div class="topics-container" id="topicsContainer">
            <!-- Topics will be loaded here -->
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() {
            localStorage.clear();
        }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') {
            window.location.href = '../login.html';
        }
        
        function getStatusClass(status) {
            switch(status) {
                case 'approved': return 'status-approved';
                case 'rejected': return 'status-rejected';
                case 'revision': return 'status-revision';
                default: return 'status-pending';
            }
        }
        
        function getScoreClass(score) {
            if (score <= 30) return 'score-low';
            if (score <= 60) return 'score-medium';
            return 'score-high';
        }
        
        function loadTopics() {
            const topics = JSON.parse(localStorage.getItem('studentTopics') || '[]');
            const container = document.getElementById('topicsContainer');
            
            if (topics.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>No Topics Submitted Yet</h3>
                        <p>Click the button below to submit your first project topic</p>
                        <a href="submit-topic.html" class="btn-submit" style="display: inline-block; margin-top: 1rem; text-decoration: none;">
                            <i class="fas fa-upload"></i> Submit New Topic
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = topics.reverse().map(topic => `
                <div class="topic-card" data-id="${topic.id}">
                    <div class="topic-header">
                        <div class="topic-title">${escapeHtml(topic.title)}</div>
                        <span class="status-badge ${getStatusClass(topic.status)}">${topic.status.toUpperCase()}</span>
                    </div>
                    <div class="topic-meta">
                        <span><i class="fas fa-calendar"></i> Submitted: ${new Date(topic.submittedAt).toLocaleDateString()}</span>
                        <span><i class="fas fa-chart-line"></i> Plagiarism Score: 
                            <span class="plagiarism-score ${getScoreClass(topic.plagiarismScore)}">${topic.plagiarismScore}%</span>
                        </span>
                    </div>
                    <div class="topic-meta">
                        <span><i class="fas fa-tags"></i> Keywords: ${topic.keywords?.join(', ') || 'N/A'}</span>
                    </div>
                    ${topic.feedback ? `<div class="topic-meta"><span><i class="fas fa-comment"></i> Feedback: ${escapeHtml(topic.feedback)}</span></div>` : ''}
                    <div class="topic-actions">
                        <button class="btn-sm btn-view" onclick="viewTopic(${topic.id})"><i class="fas fa-eye"></i> View</button>
                        ${topic.status === 'revision' ? `<button class="btn-sm btn-edit" onclick="editTopic(${topic.id})"><i class="fas fa-edit"></i> Revise</button>` : ''}
                        <button class="btn-sm btn-delete" onclick="deleteTopic(${topic.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function viewTopic(id) {
            const topics = JSON.parse(localStorage.getItem('studentTopics') || '[]');
            const topic = topics.find(t => t.id === id);
            if (topic) {
                alert(`Topic: ${topic.title}\n\nDescription: ${topic.description}\n\nStatus: ${topic.status}\nPlagiarism Score: ${topic.plagiarismScore}%\nRisk Level: ${topic.riskLevel}`);
            }
        }
        
        function editTopic(id) {
            localStorage.setItem('editTopicId', id);
            window.location.href = 'submit-topic.html';
        }
        
        function deleteTopic(id) {
            if (confirm('Are you sure you want to delete this topic? This action cannot be undone.')) {
                let topics = JSON.parse(localStorage.getItem('studentTopics') || '[]');
                topics = topics.filter(t => t.id !== id);
                localStorage.setItem('studentTopics', JSON.stringify(topics));
                loadTopics();
                alert('Topic deleted successfully.');
            }
        }
        
        loadTopics();
    </script>
</body>
</html>
