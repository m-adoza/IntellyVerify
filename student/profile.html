<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .profile-container {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .profile-avatar i {
            font-size: 3rem;
            color: white;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #dce5ef;
            border-radius: 12px;
            font-size: 1rem;
        }

        .btn-save {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-user"></i> My Profile</h1>
                <p>View and manage your personal information</p>
            </div>
            <div class="user-info">
                <div class="avatar">JD</div>
            </div>
        </div>

        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h2>John Doe</h2>
                <p>Computer Science Student</p>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" value="John Doe" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Student ID</label>
                    <input type="text" id="studentId" value="STU2024001" readonly disabled style="background: #e9ecef;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" value="john.doe@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Department</label>
                    <select id="department">
                        <option>Computer Science</option>
                        <option selected>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Software Engineering</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" value="+1 (555) 123-4567">
                </div>
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() { localStorage.clear(); }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') window.location.href = '../login.html';
        
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('✅ Profile updated successfully!');
        });
    </script>
</body>
</html>
