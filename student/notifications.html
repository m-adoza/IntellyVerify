<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .notification-item {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .notification-item.unread {
            border-left: 4px solid #0d6efd;
            background: #f8f9fa;
        }

        .notification-icon {
            width: 50px;
            height: 50px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-icon i {
            font-size: 1.5rem;
            color: #0d6efd;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .notification-time {
            font-size: 0.75rem;
            color: #5e7a93;
        }

        .mark-read-btn {
            background: transparent;
            border: none;
            color: #0d6efd;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html" class="active"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-bell"></i> Notifications</h1>
                <p>Stay updated with your project status</p>
            </div>
            <div class="user-info">
                <div class="avatar">JD</div>
            </div>
        </div>

        <div id="notificationsContainer"></div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() { localStorage.clear(); }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') window.location.href = '../login.html';
        
        let notifications = [
            { id: 1, title: 'Topic Under Review', message: 'Your topic "AI-Based Plagiarism Detection" is being reviewed by your supervisor.', time: '2 hours ago', read: false, icon: 'fas fa-clock' },
            { id: 2, title: 'Plagiarism Check Complete', message: 'Plagiarism analysis completed. Your score is 15% - Low Risk.', time: '1 day ago', read: true, icon: 'fas fa-chart-line' },
            { id: 3, title: 'New Message from Supervisor', message: 'Dr. Johnson sent you a message regarding your topic submission.', time: '2 days ago', read: true, icon: 'fas fa-envelope' },
            { id: 4, title: 'Submission Deadline Approaching', message: 'Final project submission deadline is in 30 days.', time: '3 days ago', read: false, icon: 'fas fa-calendar-alt' }
        ];
        
        function markAsRead(id) {
            const notification = notifications.find(n => n.id === id);
            if (notification) notification.read = true;
            renderNotifications();
        }
        
        function markAllRead() {
            notifications.forEach(n => n.read = true);
            renderNotifications();
        }
        
        function renderNotifications() {
            const container = document.getElementById('notificationsContainer');
            const unreadCount = notifications.filter(n => !n.read).length;
            
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>All Notifications (${notifications.length})</h3>
                    ${unreadCount > 0 ? `<button class="mark-read-btn" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark all as read</button>` : ''}
                </div>
                ${notifications.map(n => `
                    <div class="notification-item ${n.read ? '' : 'unread'}" onclick="markAsRead(${n.id})">
                        <div class="notification-icon">
                            <i class="${n.icon}"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-title">${escapeHtml(n.title)}</div>
                            <p>${escapeHtml(n.message)}</p>
                            <div class="notification-time">${n.time}</div>
                        </div>
                        ${!n.read ? '<i class="fas fa-circle" style="color: #0d6efd; font-size: 0.6rem; align-self: center;"></i>' : ''}
                    </div>
                `).join('')}
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        renderNotifications();
    </script>
</body>
</html>
