<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Reports | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-header i {
            font-size: 2rem;
            color: #0d6efd;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .report-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .similarity-score {
            font-size: 2rem;
            font-weight: bold;
        }

        .risk-badge {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
        }

        .match-item {
            padding: 0.8rem;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn-download {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html" class="active"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-file-alt"></i> Plagiarism Reports</h1>
                <p>Detailed similarity analysis for your submissions</p>
            </div>
            <div class="user-info">
                <div class="avatar">JD</div>
            </div>
        </div>

        <div id="reportsContainer"></div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() { localStorage.clear(); }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') window.location.href = '../login.html';
        
        const topics = JSON.parse(localStorage.getItem('studentTopics') || '[]');
        const container = document.getElementById('reportsContainer');
        
        if (topics.length === 0) {
            container.innerHTML = `
                <div class="report-card" style="text-align: center;">
                    <i class="fas fa-search" style="font-size: 3rem; color: #5e7a93;"></i>
                    <h3>No Reports Available</h3>
                    <p>Submit a topic to generate a plagiarism report.</p>
                    <a href="submit-topic.html" style="display: inline-block; margin-top: 1rem; background: #0d6efd; color: white; padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none;">Submit Topic</a>
                </div>
            `;
        } else {
            container.innerHTML = topics.map(topic => {
                let riskColor = '';
                if (topic.plagiarismScore <= 30) riskColor = '#28a745';
                else if (topic.plagiarismScore <= 60) riskColor = '#ffc107';
                else riskColor = '#dc3545';
                
                return `
                    <div class="report-card">
                        <div class="report-header">
                            <div>
                                <h3>${escapeHtml(topic.title)}</h3>
                                <p style="color: #5e7a93; font-size: 0.85rem;">Submitted: ${new Date(topic.submittedAt).toLocaleDateString()}</p>
                            </div>
                            <div class="similarity-score" style="color: ${riskColor};">${topic.plagiarismScore}%</div>
                        </div>
                        <div class="risk-badge" style="background: ${riskColor}20; color: ${riskColor};">
                            Risk Level: ${topic.riskLevel}
                        </div>
                        <div style="margin: 1rem 0;">
                            <h4>AI-Powered Analysis Details</h4>
                            <p><strong>Algorithm:</strong> Keyword Matching (40%) + Cosine Similarity (60%)</p>
                            <p><strong>Recommendation:</strong> ${topic.plagiarismScore <= 30 ? 'Topic appears original. Proceed with submission.' : topic.plagiarismScore <= 60 ? 'Moderate similarity detected. Consider revising.' : 'High similarity detected. Please choose a different topic.'}</p>
                        </div>
                        <button class="btn-download" onclick="downloadReport(${topic.id})"><i class="fas fa-download"></i> Download Full Report (PDF)</button>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function downloadReport(id) {
            alert('📄 Downloading plagiarism report...\n\nReport includes:\n- Similarity Score\n- Risk Classification\n- Matching Sources\n- AI Recommendations');
        }
    </script>
</body>
</html>
