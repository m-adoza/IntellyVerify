<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Progress | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-header i {
            font-size: 2rem;
            color: #0d6efd;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .progress-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .progress-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
        }

        .progress-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 1rem;
        }

        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: #0d6efd;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .milestone {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eef2f7;
        }

        .milestone-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .milestone-icon.completed {
            background: #d4edda;
            color: #155724;
        }

        .milestone-icon.pending {
            background: #e9ecef;
            color: #5e7a93;
        }

        .milestone-icon.current {
            background: #0d6efd;
            color: white;
        }

        .gantt-chart {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .gantt-row {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .gantt-label {
            width: 200px;
            font-weight: 500;
        }

        .gantt-bar-container {
            flex: 1;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
        }

        .gantt-bar {
            height: 100%;
            background: #0d6efd;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html" class="active"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-chart-line"></i> Project Progress</h1>
                <p>Track your final year project milestones</p>
            </div>
            <div class="user-info">
                <div class="avatar">JD</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-card">
                <h3><i class="fas fa-chart-simple"></i> Overall Progress</h3>
                <div class="progress-circle" id="progressCircle"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="overallProgress" style="width: 45%"></div>
                </div>
                <p style="text-align: center; margin-top: 0.5rem;">45% Complete</p>
            </div>
            <div class="progress-card">
                <h3><i class="fas fa-tasks"></i> Task Breakdown</h3>
                <div id="taskBreakdown"></div>
            </div>
        </div>

        <div class="gantt-chart">
            <h3><i class="fas fa-chart-gantt"></i> Project Timeline (Gantt Chart)</h3>
            <div id="ganttContainer"></div>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() { localStorage.clear(); }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') window.location.href = '../login.html';
        
        const tasks = [
            { name: 'Topic Submission', completed: true, weight: 10 },
            { name: 'Literature Review', completed: true, weight: 15 },
            { name: 'Methodology', completed: false, weight: 15 },
            { name: 'System Development', completed: false, weight: 25 },
            { name: 'Testing & Validation', completed: false, weight: 15 },
            { name: 'Thesis Writing', completed: false, weight: 10 },
            { name: 'Final Submission', completed: false, weight: 10 }
        ];
        
        const totalWeight = tasks.reduce((sum, t) => sum + t.weight, 0);
        const completedWeight = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.weight, 0);
        const overallPercent = Math.round((completedWeight / totalWeight) * 100);
        
        document.getElementById('overallProgress').style.width = `${overallPercent}%`;
        
        const taskBreakdown = document.getElementById('taskBreakdown');
        taskBreakdown.innerHTML = tasks.map(task => `
            <div style="margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                    <span>${task.name}</span>
                    <span>${task.completed ? '✅' : '⏳'}</span>
                </div>
                <div class="progress-bar" style="height: 6px;">
                    <div class="progress-fill" style="width: ${task.completed ? 100 : 0}%"></div>
                </div>
            </div>
        `).join('');
        
        const milestones = [
            { name: 'Topic Approval', start: 0, duration: 14, completed: true },
            { name: 'Research Phase', start: 14, duration: 30, completed: true },
            { name: 'Development', start: 44, duration: 45, completed: false },
            { name: 'Testing', start: 89, duration: 21, completed: false },
            { name: 'Documentation', start: 110, duration: 30, completed: false }
        ];
        
        const maxDays = 140;
        
        const ganttContainer = document.getElementById('ganttContainer');
        ganttContainer.innerHTML = milestones.map(m => {
            const widthPercent = (m.duration / maxDays) * 100;
            const startPercent = (m.start / maxDays) * 100;
            return `
                <div class="gantt-row">
                    <div class="gantt-label">${m.name}</div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar" style="width: ${widthPercent}%; margin-left: ${startPercent}%; background: ${m.completed ? '#28a745' : '#0d6efd'}">
                            ${m.completed ? '✓' : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    </script>
</body>
</html>
