<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval Status | IntelliVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #eef2f7;
        }

        .sidebar-header i {
            font-size: 2rem;
            color: #0d6efd;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.5rem;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(13, 110, 253, 0.1);
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }

        .main-content {
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
        }

        .user-info .avatar {
            width: 45px;
            height: 45px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0d6efd;
        }

        .timeline {
            background: white;
            border-radius: 28px;
            padding: 2rem;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 2rem;
            position: relative;
        }

        .timeline-icon {
            width: 50px;
            height: 50px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            z-index: 2;
        }

        .timeline-icon.completed {
            background: #d4edda;
            color: #155724;
        }

        .timeline-icon.current {
            background: #0d6efd;
            color: white;
        }

        .timeline-content {
            flex: 1;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eef2f7;
        }

        .timeline-content h4 {
            margin-bottom: 0.3rem;
        }

        .timeline-content p {
            color: #5e7a93;
            font-size: 0.85rem;
        }

        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .current-status {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -260px;
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-microchip"></i>
            <h3>IntelliVerify</h3>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="submit-topic.html"><i class="fas fa-upload"></i> Submit Topic</a>
            <a href="my-topics.html"><i class="fas fa-list"></i> My Topics</a>
            <a href="approval-status.html" class="active"><i class="fas fa-check-circle"></i> Approval Status</a>
            <a href="project-progress.html"><i class="fas fa-chart-line"></i> Project Progress</a>
            <a href="plagiarism-report.html"><i class="fas fa-file-alt"></i> Plagiarism Reports</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="../login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
                <h1><i class="fas fa-check-circle"></i> Approval Status</h1>
                <p>Track your topic approval progress</p>
            </div>
            <div class="user-info">
                <div class="avatar">JD</div>
            </div>
        </div>

        <div class="status-card">
            <i class="fas fa-hourglass-half" style="font-size: 2rem;"></i>
            <div class="current-status" id="currentStatus">Under Review</div>
            <p>Your latest submission is being reviewed by your supervisor</p>
        </div>

        <div class="timeline">
            <h3><i class="fas fa-timeline"></i> Approval Timeline</h3>
            <div id="timelineContainer"></div>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
        
        function logout() { localStorage.clear(); }
        
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'student') window.location.href = '../login.html';
        
        const topics = JSON.parse(localStorage.getItem('studentTopics') || '[]');
        const latestTopic = topics[topics.length - 1];
        
        const timelineContainer = document.getElementById('timelineContainer');
        const currentStatusSpan = document.getElementById('currentStatus');
        
        const statuses = [
            { name: 'Topic Submitted', icon: 'fas fa-paper-plane', description: 'Your topic has been successfully submitted' },
            { name: 'Plagiarism Check', icon: 'fas fa-search', description: 'AI-powered plagiarism detection completed' },
            { name: 'Supervisor Review', icon: 'fas fa-chalkboard-user', description: 'Supervisor is reviewing your topic' },
            { name: 'Final Decision', icon: 'fas fa-gavel', description: 'Approval or rejection decision' }
        ];
        
        let currentStep = 2; // Default to Supervisor Review
        let finalStatus = 'pending';
        
        if (latestTopic) {
            if (latestTopic.status === 'approved') {
                currentStep = 3;
                finalStatus = 'approved';
                currentStatusSpan.innerHTML = '✅ Approved!';
                currentStatusSpan.parentElement.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
            } else if (latestTopic.status === 'rejected') {
                currentStep = 3;
                finalStatus = 'rejected';
                currentStatusSpan.innerHTML = '❌ Rejected';
                currentStatusSpan.parentElement.style.background = 'linear-gradient(135deg, #dc3545, #c82333)';
            } else if (latestTopic.status === 'revision') {
                currentStep = 2;
                finalStatus = 'revision';
                currentStatusSpan.innerHTML = '📝 Revision Required';
                currentStatusSpan.parentElement.style.background = 'linear-gradient(135deg, #ffc107, #e0a800)';
            }
        }
        
        timelineContainer.innerHTML = statuses.map((status, index) => {
            let statusClass = '';
            let iconClass = '';
            
            if (index < currentStep) {
                statusClass = 'completed';
                iconClass = 'fas fa-check';
            } else if (index === currentStep && finalStatus === 'pending') {
                statusClass = 'current';
                iconClass = status.icon;
            } else {
                statusClass = '';
                iconClass = status.icon;
            }
            
            return `
                <div class="timeline-item">
                    <div class="timeline-icon ${statusClass}">
                        <i class="${iconClass}"></i>
                    </div>
                    <div class="timeline-content">
                        <h4>${status.name}</h4>
                        <p>${status.description}</p>
                        ${index < currentStep ? '<small><i class="fas fa-check-circle" style="color: #28a745;"></i> Completed</small>' : ''}
                        ${index === currentStep && finalStatus === 'pending' ? '<small><i class="fas fa-spinner fa-pulse"></i> In Progress</small>' : ''}
                    </div>
                </div>
            `;
        }).join('');
    </script>
</body>
</html>
