<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliVerify | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .register-container {
            max-width: 550px;
            margin: 0 auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo i {
            font-size: 3rem;
            color: white;
        }

        .logo h2 {
            color: white;
            margin-top: 0.5rem;
        }

        .register-card {
            background: white;
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .register-card h3 i {
            color: #0d6efd;
        }

        .subtitle {
            text-align: center;
            color: #5e7a93;
            margin-bottom: 2rem;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: #f4f6f9;
            padding: 0.5rem;
            border-radius: 60px;
        }

        .role-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .role-btn.active {
            background: #0d6efd;
            color: white;
        }

        .input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #0d6efd;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1px solid #dce5ef;
            border-radius: 60px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }

        .double-input {
            display: flex;
            gap: 1rem;
        }

        .double-input .input-group {
            flex: 1;
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.5rem 0;
        }

        .terms input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .terms a {
            color: #0d6efd;
            text-decoration: none;
        }

        .btn-register {
            width: 100%;
            background: #0d6efd;
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register:hover {
            background: #0b5ed7;
            transform: scale(0.98);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-link a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            text-align: center;
            margin-top: 1rem;
        }

        .back-home a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <i class="fas fa-microchip"></i>
            <h2>IntelliVerify</h2>
        </div>
        
        <div class="register-card">
            <h3><i class="fas fa-user-plus"></i> Create Account</h3>
            <div class="subtitle">Join the academic integrity network</div>
            
            <div class="role-selector">
                <button class="role-btn active" data-role="student">
                    <i class="fas fa-user-graduate"></i> Student
                </button>
                <button class="role-btn" data-role="supervisor">
                    <i class="fas fa-chalkboard-user"></i> Supervisor
                </button>
            </div>
            
            <form id="registerForm">
                <div class="double-input">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group" id="studentIdGroup">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="studentId" placeholder="Student ID Number">
                </div>
                
                <div class="input-group" id="departmentGroup">
                    <i class="fas fa-building"></i>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Software Engineering</option>
                        <option>Data Science</option>
                        <option>Cyber Security</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password (min. 6 characters)" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="termsCheckbox" required>
                    <label>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn-register">
                    <i class="fas fa-user-check"></i> Create Account
                </button>
                
                <div class="login-link">
                    Already have an account? <a href="login.html">Sign in</a>
                </div>
            </form>
        </div>
        
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        let selectedRole = 'student';
        
        // Role selector
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.getAttribute('data-role');
                
                // Show/hide student-specific fields
                const studentIdGroup = document.getElementById('studentIdGroup');
                const departmentGroup = document.getElementById('departmentGroup');
                
                if (selectedRole === 'student') {
                    studentIdGroup.style.display = 'block';
                    departmentGroup.style.display = 'block';
                } else {
                    studentIdGroup.style.display = 'none';
                    departmentGroup.style.display = 'none';
                }
            });
        });
        
        const registerForm = document.getElementById('registerForm');
        
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheckbox').checked;
            
            if (!firstName || !lastName || !email || !password) {
                alert('⚠️ Please fill in all required fields.');
                return;
            }
            
            if (password.length < 6) {
                alert('⚠️ Password must be at least 6 characters long.');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('⚠️ Passwords do not match.');
                return;
            }
            
            if (!terms) {
                alert('⚠️ You must agree to the Terms of Service.');
                return;
            }
            
            if (selectedRole === 'student') {
                const studentId = document.getElementById('studentId').value;
                if (!studentId) {
                    alert('⚠️ Please enter your Student ID.');
                    return;
                }
            }
            
            // Simulate registration
            const btn = document.querySelector('.btn-register');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating account...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert(`✅ Welcome ${firstName} ${lastName}!\nYour account has been created successfully.\nYou can now login.`);
                window.location.href = 'login.html';
            }, 1500);
        });
        
        // Password match validation
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        
        function validatePasswordMatch() {
            if (confirmInput.value && passwordInput.value !== confirmInput.value) {
                confirmInput.style.borderColor = '#dc3545';
            } else {
                confirmInput.style.borderColor = '#dce5ef';
            }
        }
        
        passwordInput.addEventListener('input', validatePasswordMatch);
        confirmInput.addEventListener('input', validatePasswordMatch);
    </script>
</body>
</html>
